name: Android APK

on:
  push:
    branches: [ "development", "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "development", "main" ]
  release:
    types: [ "published" ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS_VERSION: "36.0.0"
  JAVA_VERSION: "21"
  NODE_VERSION: "22"

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          sdk_root="$RUNNER_TEMP/android-sdk"
          echo "ANDROID_HOME=$sdk_root" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$sdk_root" >> "$GITHUB_ENV"
          scripts/android-sdk-setup.sh \
            --sdk-root "$sdk_root" \
            --api-level "$ANDROID_API_LEVEL" \
            --build-tools "$ANDROID_BUILD_TOOLS_VERSION"

      - name: Install Node dependencies
        run: npm ci

      - name: Build Capacitor Android APK
        shell: bash
        run: scripts/ci/build-capacitor-android-apk.sh

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: caldaver-android-debug-apk
          path: build/android-apk/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Attach APK to GitHub release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/android-apk/*.apk
