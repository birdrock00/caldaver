name: Daily release

on:
  schedule:
    - cron: "17 10 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: daily-release
  cancel-in-progress: false

env:
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS_VERSION: "36.0.0"
  JAVA_VERSION: "21"
  NODE_VERSION: "22"

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      date_tag: ${{ steps.release.outputs.date_tag }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      image_repo: ${{ steps.release.outputs.image_repo }}
      previous_tag: ${{ steps.release.outputs.previous_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          date_tag="$(date -u +'%Y-%m-%d')"
          release_tag="$(date -u +'%Y-%m-%d-%H%M%S')"
          image_repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          git fetch --tags --force
          previous_tag="$(git tag --list '20[0-9][0-9]-[0-9][0-9]-[0-9][0-9]*' --sort=-creatordate | awk -v current="$release_tag" '$0 != current && $0 != "latest" { print; exit }')"
          {
            echo "date_tag=$date_tag"
            echo "release_tag=$release_tag"
            echo "image_repo=$image_repo"
            echo "previous_tag=$previous_tag"
          } >> "$GITHUB_OUTPUT"

  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ needs.prepare.outputs.image_repo }}:${{ needs.prepare.outputs.release_tag }}
            ${{ needs.prepare.outputs.image_repo }}:${{ needs.prepare.outputs.date_tag }}
            ${{ needs.prepare.outputs.image_repo }}:latest

  android:
    name: Publish Android APK release
    runs-on: ubuntu-latest
    needs: prepare
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          sdk_root="$RUNNER_TEMP/android-sdk"
          echo "ANDROID_HOME=$sdk_root" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$sdk_root" >> "$GITHUB_ENV"
          scripts/android-sdk-setup.sh \
            --sdk-root "$sdk_root" \
            --api-level "$ANDROID_API_LEVEL" \
            --build-tools "$ANDROID_BUILD_TOOLS_VERSION"

      - name: Install Node dependencies
        run: npm install --no-audit --no-fund

      - name: Build Capacitor Android APK
        shell: bash
        run: scripts/ci/build-capacitor-android-apk.sh

      - name: Name APK with release date
        shell: bash
        run: |
          set -euo pipefail
          apk="$(find build/android-apk -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          test -n "$apk"
          mv "$apk" "build/android-apk/caldaver-android-${{ needs.prepare.outputs.release_tag }}.apk"

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: caldaver-android-apk
          path: build/android-apk/*.apk
          if-no-files-found: error

  release:
    name: Publish GitHub releases
    runs-on: ubuntu-latest
    needs:
      - prepare
      - docker
      - android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Android APK artifact
        uses: actions/download-artifact@v4
        with:
          name: caldaver-android-apk
          path: build/android-apk

      - name: Publish release and latest git tags
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force
          git tag -fa "${{ needs.prepare.outputs.release_tag }}" "$GITHUB_SHA" -m "Caldaver release ${{ needs.prepare.outputs.release_tag }}"
          git tag -fa latest "$GITHUB_SHA" -m "Caldaver latest release"
          git push --force origin "refs/tags/${{ needs.prepare.outputs.release_tag }}"
          git push --force origin "refs/tags/latest"

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          notes_file="$RUNNER_TEMP/release-notes.md"
          {
            echo "## Artifacts"
            echo
            echo "- Docker image: \`${{ needs.prepare.outputs.image_repo }}:${{ needs.prepare.outputs.release_tag }}\`"
            echo "- Docker image date alias: \`${{ needs.prepare.outputs.image_repo }}:${{ needs.prepare.outputs.date_tag }}\`"
            echo "- Docker image: \`${{ needs.prepare.outputs.image_repo }}:latest\`"
            echo "- Android APK: attached to this release"
            echo "- Source code: GitHub-generated source archives for this tag"
            echo
            echo "## Changes"
            echo
          } > "$notes_file"

          previous_tag="${{ needs.prepare.outputs.previous_tag }}"
          if [ -n "$previous_tag" ] && git rev-parse --verify --quiet "refs/tags/$previous_tag" >/dev/null; then
            range="$previous_tag..HEAD"
            echo "Changes since \`$previous_tag\`:" >> "$notes_file"
            echo >> "$notes_file"
          else
            range="HEAD"
            echo "All reachable changes in this release:" >> "$notes_file"
            echo >> "$notes_file"
          fi

          if git log --format='- %s (%h)' "$range" >> "$notes_file"; then
            if ! grep -q '^- ' "$notes_file"; then
              echo "- No code changes since the previous release." >> "$notes_file"
            fi
          else
            echo "- Unable to calculate git change list." >> "$notes_file"
          fi

          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Publish dated GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${{ needs.prepare.outputs.release_tag }}" >/dev/null 2>&1; then
            gh release edit "${{ needs.prepare.outputs.release_tag }}" \
              --title "CalDaver ${{ needs.prepare.outputs.release_tag }}" \
              --notes-file "${{ steps.notes.outputs.notes_file }}"
          else
            gh release create "${{ needs.prepare.outputs.release_tag }}" \
              --title "CalDaver ${{ needs.prepare.outputs.release_tag }}" \
              --notes-file "${{ steps.notes.outputs.notes_file }}" \
              --latest=false
          fi
          assets="$(gh release view "${{ needs.prepare.outputs.release_tag }}" --json assets --jq '.assets[].name' | grep '^caldaver-android-.*\.apk$' || true)"
          while IFS= read -r asset; do
            [ -n "$asset" ] || continue
            gh release delete-asset "${{ needs.prepare.outputs.release_tag }}" "$asset" --yes
          done <<< "$assets"
          gh release upload "${{ needs.prepare.outputs.release_tag }}" build/android-apk/*.apk --clobber

      - name: Publish latest GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view latest >/dev/null 2>&1; then
            gh release edit latest \
              --title "CalDaver latest" \
              --notes-file "${{ steps.notes.outputs.notes_file }}" \
              --latest
          else
            gh release create latest \
              --title "CalDaver latest" \
              --notes-file "${{ steps.notes.outputs.notes_file }}" \
              --latest
          fi
          assets="$(gh release view latest --json assets --jq '.assets[].name' | grep '^caldaver-android-.*\.apk$' || true)"
          while IFS= read -r asset; do
            [ -n "$asset" ] || continue
            gh release delete-asset latest "$asset" --yes
          done <<< "$assets"
          gh release upload latest build/android-apk/*.apk --clobber
