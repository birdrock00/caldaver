<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Caldaver</title>
    <link rel="shortcut icon" href="img/favicon.ico">
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        background: #f6f8fb;
        color: #20242a;
        display: flex;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
      }

      main {
        max-width: 520px;
        text-align: center;
      }

      img {
        height: auto;
        margin-bottom: 20px;
        max-width: 160px;
      }

      h1 {
        font-size: 28px;
        margin: 0 0 12px;
      }

      p {
        color: #5b6470;
        font-size: 16px;
        line-height: 1.5;
        margin: 0;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #11161c;
          color: #f5f7fa;
        }

        p {
          color: #b8c0ca;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="img/caldaver_300transp.png" alt="">
      <h1>Caldaver</h1>
      <p>
        This Android build needs a Caldaver server URL configured at build time.
        Set CALDAVER_ANDROID_SERVER_URL or CALDAVER_BASE_URL when building the APK.
      </p>
    </main>
  </body>
</html>
