<div class="navbar navbar-default caldaver-topbar" role="navigation">
  <div class="container-fluid">
   <details class="mobile-section-menu">
     <summary aria-label="Sections">
       <i class="fa fa-bars"></i>
     </summary>
     <nav class="mobile-section-menu-list" aria-label="Application sections">
       <details class="mobile-calendar-menu" data-calendar-href="{{ app.url_generator.generate('calendar') }}">
         <summary class="{% if active_section|default('calendar') == 'calendar' %}active{% endif %}">
           <i class="fa fa-calendar"></i>
           <span>{% trans %}labels.calendar{% endtrans %}</span>
           <i class="fa fa-caret-right mobile-calendar-menu-caret" aria-hidden="true"></i>
         </summary>
         <div class="mobile-calendar-menu-calendars" aria-label="{% trans %}labels.calendars{% endtrans %}" data-calendars-url="{{ app.url_generator.generate('calendar') }}calendars">
           <span class="mobile-calendar-menu-empty">Loading calendars...</span>
         </div>
       </details>
       <a class="{% if active_section|default('calendar') == 'cards' %}active{% endif %}" href="{{ app.url_generator.generate('cards') }}">
         <i class="fa fa-book"></i>
         <span>{% trans %}labels.contacts{% endtrans %}</span>
       </a>
       <a class="{% if active_section|default('calendar') == 'mail' %}active{% endif %}" href="{{ app.url_generator.generate('mail') }}">
         <i class="fa fa-envelope"></i>
         <span>{% trans %}labels.mail{% endtrans %}</span>
       </a>
     </nav>
   </details>
    <div class="navbar-header">
      <button class="topbar-menu" type="button" aria-label="Toggle sidebar" title="Toggle sidebar">
        <i class="fa fa-bars"></i>
      </button>
       <span class="navbar-brand">
         <span class="mobile-calendar-toolbar-title" aria-hidden="true">
           <span id="mobile_calendar_toolbar_date"></span>
           <span id="mobile_calendar_toolbar_day"></span>
         </span>
       </span>
   </div>
    <p class="navbar-text navbar-right" id="loading">
    <span class="navbar-spinner" aria-hidden="true"></span>
    </p>
   <ul class="nav navbar-nav navbar-right topbar-actions" id="usermenu">
       <li class="mobile-calendar-toolbar-action">
       <button type="button" id="mobile_calendar_date_action" title="{% trans %}labels.choose_date{% endtrans %}" aria-label="{% trans %}labels.choose_date{% endtrans %}">
         <i class="fa fa-calendar"></i>
       </button>
       </li>
       <li class="mobile-calendar-toolbar-action">
        <button type="button" id="mobile_calendar_more_action" title="{% trans %}labels.more{% endtrans %}" aria-label="{% trans %}labels.more{% endtrans %}">
         <i class="fa fa-ellipsis-v"></i>
       </button>
       </li>
       <li>
       <a class="prefs" href="{{ app.url_generator.generate('preferences') }}" title="{% trans %}labels.preferences{% endtrans %}" aria-label="{% trans %}labels.preferences{% endtrans %}">
         <i class="fa fa-lg fa-wrench" aria-hidden="true"></i>
       </a>
       </li>
       <li class="user-menu">
         <details class="user-menu-dropdown">
           <summary class="user-pill" aria-label="User menu">
             <span class="user-pill-label">{{ app.session.get('displayname') }}</span>
             <i class="fa fa-caret-down" aria-hidden="true"></i>
           </summary>
           <nav class="user-menu-list" aria-label="User menu">
             <button type="button" class="user-menu-item user-menu-instance-reset" hidden>
               <i class="fa fa-exchange" aria-hidden="true"></i>
                <span>{% trans %}labels.change_instance{% endtrans %}</span>
             </button>
             <a class="user-menu-item user-menu-logout" href="{{ app.url_generator.generate('logout') }}">
               <i class="fa fa-power-off" aria-hidden="true"></i>
               <span>{% trans %}labels.logout{% endtrans %}</span>
             </a>
           </nav>
         </details>
       </li>
   </ul>
  </div>
</div>
<script>
(function() {
  function mobileCalendarMenu() {
    return document.querySelector('.mobile-calendar-menu');
  }

  function mobileCalendarList() {
    return document.querySelector('.mobile-calendar-menu-calendars');
  }

  function setMobileCalendarMenuMessage(message) {
    var list = mobileCalendarList();
    if (!list) {
      return;
    }

    list.innerHTML = '';
    var empty = document.createElement('span');
    empty.className = 'mobile-calendar-menu-empty';
    empty.textContent = message;
    list.appendChild(empty);
  }

  function renderMobileCalendarMenu(calendars) {
    var list = mobileCalendarList();
    if (!list) {
      return;
    }

    list.innerHTML = '';
    if (!calendars || calendars.length === 0) {
      setMobileCalendarMenuMessage('No calendars found');
      return;
    }

    calendars.forEach(function(calendar) {
      var button = document.createElement('button');
      button.type = 'button';
      button.className = 'mobile-calendar-account';
      button.dataset.calendarUrl = calendar.calendar || '';
      button.setAttribute('aria-pressed', 'true');

      var color = document.createElement('span');
      color.className = 'mobile-calendar-account-color';
      color.style.backgroundColor = calendar.color || '#3367d6';
      button.appendChild(color);

      var name = document.createElement('span');
      name.className = 'mobile-calendar-account-name';
      name.textContent = calendar.displayname || calendar.calendar || 'Calendar';
      button.appendChild(name);

      if (calendar.is_shared === true) {
        var shared = document.createElement('i');
        shared.className = 'fa fa-share mobile-calendar-account-shared';
        shared.setAttribute('aria-hidden', 'true');
        button.appendChild(shared);
      }

      list.appendChild(button);
    });
  }

  function loadMobileCalendarMenu() {
    var list = mobileCalendarList();
    if (!list || list.dataset.loaded === 'true' || document.querySelector('#own_calendar_list, #shared_calendar_list')) {
      return;
    }

    var calendarsUrl = list.dataset.calendarsUrl;
    if (!calendarsUrl) {
      return;
    }

    list.dataset.loaded = 'true';
    fetch(calendarsUrl, {
      credentials: 'same-origin',
      headers: { 'Accept': 'application/json' }
    })
      .then(function(response) {
        if (!response.ok) {
          throw new Error('Unable to load calendars');
        }
        return response.json();
      })
      .then(function(payload) {
        renderMobileCalendarMenu(payload.data || []);
      })
      .catch(function() {
        list.dataset.loaded = 'false';
        setMobileCalendarMenuMessage('Unable to load calendars');
      });
  }

  document.addEventListener('DOMContentLoaded', function() {
    var menu = mobileCalendarMenu();
    if (!menu) {
      return;
    }

    menu.addEventListener('toggle', function() {
      if (menu.open) {
        loadMobileCalendarMenu();
      }
    });

    var sectionMenu = document.querySelector('.mobile-section-menu');
    if (sectionMenu) {
      sectionMenu.addEventListener('click', function(event) {
        var account = event.target.closest && event.target.closest('.mobile-calendar-account');
        if (!account || document.querySelector('#own_calendar_list, #shared_calendar_list')) {
          return;
        }

        event.preventDefault();
        window.location.href = menu.dataset.calendarHref || '/';
      });
    }
  });

  document.addEventListener('DOMContentLoaded', function() {
    var resetButton = document.querySelector('.user-menu-instance-reset');
    var plugin = window.Capacitor &&
      window.Capacitor.Plugins &&
      window.Capacitor.Plugins.CaldaverInstance;
    var isAndroid = window.Capacitor &&
      typeof window.Capacitor.getPlatform === 'function' &&
      window.Capacitor.getPlatform() === 'android';

    if (!resetButton || !isAndroid || !plugin || typeof plugin.clearAndShowSetup !== 'function') {
      return;
    }

    resetButton.hidden = false;
    resetButton.addEventListener('click', function() {
      if (!window.confirm('Change the Caldaver instance for this Android app?')) {
        return;
      }

      plugin.clearAndShowSetup().catch(function() {
        window.location.href = '/';
      });
    });
  });
})();
</script>
