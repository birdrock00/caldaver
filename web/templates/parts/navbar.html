<div class="navbar navbar-default caldaver-topbar" role="navigation">
  <div class="container-fluid">
   <details class="mobile-section-menu">
     <summary aria-label="Sections">
       <i class="fa fa-bars"></i>
     </summary>
     <nav class="mobile-section-menu-list" aria-label="Application sections">
       <details class="mobile-calendar-menu">
         <summary class="{% if active_section|default('calendar') == 'calendar' %}active{% endif %}">
           <i class="fa fa-calendar"></i>
           <span>{% trans %}labels.calendar{% endtrans %}</span>
           <i class="fa fa-caret-right mobile-calendar-menu-caret" aria-hidden="true"></i>
         </summary>
         <div class="mobile-calendar-menu-calendars" aria-label="{% trans %}labels.calendars{% endtrans %}">
           <span class="mobile-calendar-menu-empty">Loading calendars...</span>
         </div>
       </details>
       <a class="{% if active_section|default('calendar') == 'cards' %}active{% endif %}" href="{{ app.url_generator.generate('cards') }}">
         <i class="fa fa-book"></i>
         <span>{% trans %}labels.contacts{% endtrans %}</span>
       </a>
       <a class="{% if active_section|default('calendar') == 'mail' %}active{% endif %}" href="{{ app.url_generator.generate('mail') }}">
         <i class="fa fa-envelope"></i>
         <span>{% trans %}labels.mail{% endtrans %}</span>
       </a>
     </nav>
   </details>
    <div class="navbar-header">
      <button class="topbar-menu" type="button" aria-label="Menu">
        <i class="fa fa-bars"></i>
      </button>
      <span class="navbar-brand">
        <span class="caldaver-brand-title">{{ title }}</span>
      </span>
   </div>
   <p class="navbar-text navbar-right" id="loading">
   <img src="{{ asset('loading.gif', 'img') }}" alt="">
   </p>
   <ul class="nav navbar-nav navbar-right topbar-actions" id="usermenu">
       <li>
       <a class="prefs" href="{{ app.url_generator.generate('preferences') }}">
         <i title="{% trans %}labels.preferences{% endtrans %}" class="fa fa-lg fa-wrench"></i>
       </a>
       </li>
       <li class="user-menu">
         <details class="user-menu-dropdown">
           <summary class="user-pill" aria-label="User menu">
             <span class="user-pill-label">{{ app.session.get('displayname') }}</span>
             <i class="fa fa-caret-down" aria-hidden="true"></i>
           </summary>
           <nav class="user-menu-list" aria-label="User menu">
             <a class="user-menu-item user-menu-logout" href="{{ app.url_generator.generate('logout') }}">
               <i class="fa fa-power-off" aria-hidden="true"></i>
               <span>{% trans %}labels.logout{% endtrans %}</span>
             </a>
           </nav>
         </details>
       </li>
   </ul>
  </div>
</div>
