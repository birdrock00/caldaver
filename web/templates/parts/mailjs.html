<script>
(function() {
  var accounts = [];
  var messages = [];
  var activeAccountId = null;
  var messageRequestId = 0;
  var autoRefreshTimer = null;
  var activeSyncs = 0;
  var mailStatus = 'loading';
  var mailStatusMessage = 'Loading cached mail...';
  var messagesFingerprint = '[]';
  var defaultRequestTimeoutMs = 20000;
  var initialAccountId = null;
  var highlightedUnreadUid = null;
  var resetPasswordMessage = 'Saved IMAP password needs to be reset after Caldaver credential rotation.';
  var preferencesUrl = '{{ app.url_generator.generate('preferences') }}';

  function $(selector) {
    return document.querySelector(selector);
  }

  function text(value) {
    return value || '';
  }

  function filteredMessages() {
    var filter = $('#mail_search').value.trim().toLowerCase();
    if (!filter) {
      return messages;
    }

    return messages.filter(function(message) {
      return [message.from, message.subject, message.date].join(' ').toLowerCase().indexOf(filter) !== -1;
    });
  }

  function readMailQuery() {
    if (!window.URLSearchParams) {
      return;
    }

    var params = new URLSearchParams(window.location.search || '');
    initialAccountId = params.get('account_id');
    highlightedUnreadUid = params.get('unread_uid');
  }

  function renderAccounts() {
    var nav = $('#mail_accounts');
    nav.innerHTML = '';

    accounts.forEach(function(account) {
      var button = document.createElement('button');
      button.type = 'button';
      button.className = 'mail-account-tab' + (account.id === activeAccountId ? ' active' : '');
      button.dataset.accountId = account.id;
      button.innerHTML = '<i class="fa fa-inbox"></i><span></span><small></small>';
      button.querySelector('span').textContent = account.label;
      button.querySelector('small').textContent = account.email_address;
      if (account.password_needs_reset) {
        button.classList.add('needs-reset');
        button.title = 'Saved IMAP password needs to be reset';
        var resetIcon = document.createElement('i');
        resetIcon.className = 'fa fa-exclamation-circle mail-account-reset-icon';
        resetIcon.setAttribute('aria-label', 'Saved IMAP password needs to be reset');
        button.appendChild(resetIcon);
      }
      button.addEventListener('click', function() {
        selectAccount(account.id, true, true);
      });
      nav.appendChild(button);
    });
  }

  function renderMessages() {
    var rows = $('#mail_rows');
    rows.innerHTML = '';

    var data = filteredMessages();

    data.forEach(function(message) {
      var row = document.createElement('article');
      row.className = 'mail-row' + (message.seen ? '' : ' unread') +
        (highlightedUnreadUid !== null && String(message.uid) === String(highlightedUnreadUid) ? ' highlighted-unread' : '');
      row.tabIndex = 0;
      row.setAttribute('role', 'button');
      row.innerHTML = '<span class="mail-from"></span><span class="mail-subject"></span><span class="mail-date"></span><div class="mail-attachments" data-testid="mail-attachments"></div>';
      row.querySelector('.mail-from').textContent = text(message.from);
      row.querySelector('.mail-subject').textContent = text(message.subject);
      row.querySelector('.mail-date').textContent = text(message.date);
      renderAttachments(row.querySelector('.mail-attachments'), message);
      row.dataset.messageHref = '{{ app.url_generator.generate('mail.read') }}' +
        '?account_id=' + encodeURIComponent(activeAccountId) +
        '&uid=' + encodeURIComponent(message.uid);
      row.addEventListener('click', function(event) {
        if (event.target.closest('a')) {
          return;
        }
        window.location.href = row.dataset.messageHref;
      });
      row.addEventListener('keydown', function(event) {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          window.location.href = row.dataset.messageHref;
        }
      });
      rows.appendChild(row);
    });

    var highlighted = rows.querySelector('.mail-row.highlighted-unread');
    if (highlighted && narrowViewport()) {
      window.requestAnimationFrame(function() {
        highlighted.scrollIntoView({ block: 'center', behavior: 'smooth' });
      });
    }

    renderMailStatus(data.length);
  }

  function messagesSignature(data) {
    return JSON.stringify((data || []).map(function(message) {
      return {
        uid: message.uid,
        from: text(message.from),
        subject: text(message.subject),
        date: text(message.date),
        seen: !!message.seen,
        attachments: (message.attachments || []).map(function(attachment) {
          return {
            part: text(attachment.part),
            filename: text(attachment.filename),
            content_type: text(attachment.content_type),
            size: attachment.size || 0
          };
        })
      };
    }));
  }

  function replaceMessages(nextMessages) {
    var nextFingerprint = messagesSignature(nextMessages);
    var changed = nextFingerprint !== messagesFingerprint;
    messages = nextMessages || [];
    messagesFingerprint = nextFingerprint;
    return changed;
  }

  function clearMessages() {
    messages = [];
    messagesFingerprint = '[]';
  }

  function renderAttachments(container, message, accountId) {
    var downloadAccountId = accountId || activeAccountId;
    container.innerHTML = '';
    (message.attachments || []).forEach(function(attachment) {
      var link = document.createElement('a');
      link.className = 'mail-attachment';
      link.setAttribute('data-testid', 'mail-attachment-download');
      link.dataset.filename = attachment.filename;
      link.href = '{{ app.url_generator.generate('mail.attachment') }}' +
        '?account_id=' + encodeURIComponent(downloadAccountId) +
        '&uid=' + encodeURIComponent(message.uid) +
        '&part=' + encodeURIComponent(attachment.part);
      link.textContent = attachment.filename;
      link.setAttribute('download', attachment.filename);
      container.appendChild(link);
    });
  }

  function activeAccount() {
    return accounts.find(function(account) {
      return account.id === activeAccountId;
    });
  }

  function setMailSyncing(syncing) {
    var nav = $('#mail_nav_item');
    if (!nav) {
      return;
    }

    if (syncing) {
      activeSyncs += 1;
      nav.classList.add('syncing');
      return;
    }

    activeSyncs = Math.max(0, activeSyncs - 1);
    if (activeSyncs === 0) {
      nav.classList.remove('syncing');
    }
  }

  function renderMailStatus(visibleMessageCount) {
    var account = activeAccount();
    var loading = mailStatus === 'loading' || mailStatus === 'syncing';
    var error = mailStatus === 'error';
    var count = typeof visibleMessageCount === 'number' ? visibleMessageCount : filteredMessages().length;

    $('#mail_loading').textContent = mailStatusMessage || 'Checking the IMAP server for mail...';
    $('#mail_loading').hidden = !loading;
    $('#mail_error').hidden = !error;
    $('#mail_no_messages').hidden = loading || error || !account || count > 0;
    $('#mail_empty').hidden = accounts.length > 0 || error || loading;
    renderComposeButton();
  }

  function setMailStatus(status, message) {
    mailStatus = status;
    mailStatusMessage = message || '';
    if (status === 'error') {
      renderMailError(mailStatusMessage);
    } else {
      $('#mail_error').hidden = true;
    }
    renderMailStatus();
  }

  function renderMailError(message) {
    var container = $('#mail_error');
    container.innerHTML = '';
    var textNode = document.createElement('span');
    textNode.textContent = message;
    container.appendChild(textNode);
    if ((message || '').indexOf(resetPasswordMessage) === 0) {
      var link = document.createElement('a');
      link.href = preferencesUrl;
      link.className = 'mail-error-action';
      link.textContent = 'Open Preferences';
      container.appendChild(link);
    }
    container.hidden = false;
  }

  function narrowViewport() {
    if (window.matchMedia) {
      return window.matchMedia('(max-width: 900px)').matches;
    }

    return window.innerWidth <= 900;
  }

  function scrollMailContentIntoView() {
    if (!narrowViewport()) {
      return;
    }

    window.requestAnimationFrame(function() {
      $('.mail-content').scrollIntoView({ block: 'start', behavior: 'smooth' });
    });
  }

  function ensureComposeControls() {
    if ($('#mail_compose')) {
      return;
    }

    var sidebar = document.querySelector('.mail-sidebar');
    var content = document.querySelector('.mail-content');
    if (!sidebar || !content) {
      return;
    }

    var button = document.createElement('button');
    button.type = 'button';
    button.id = 'mail_compose';
    button.className = 'mail-mobile-compose-button';
    button.setAttribute('aria-label', 'Compose mail');
    button.hidden = true;
    button.innerHTML = '<i class="fa fa-pencil" aria-hidden="true"></i><span>Compose</span>';
    sidebar.insertBefore(button, $('#mail_accounts') || null);

    var screen = document.createElement('section');
    screen.id = 'mail_compose_screen';
    screen.className = 'mail-compose-screen';
    screen.hidden = true;
    screen.setAttribute('aria-label', 'Compose email');
    screen.innerHTML = '<div class="mail-compose-toolbar">' +
      '<button type="button" id="mail_compose_back" aria-label="Back"><i class="fa fa-arrow-left" aria-hidden="true"></i></button>' +
      '<h1>New message</h1>' +
      '<button type="button" id="mail_compose_send" aria-label="Send" aria-disabled="true"><i class="fa fa-send" aria-hidden="true"></i></button>' +
      '</div>' +
      '<form id="mail_compose_form" class="mail-compose-form">' +
      '<div class="mail-compose-fields">' +
      '<label class="mail-compose-from"><span>From</span><input id="mail_compose_from" type="email" readonly aria-label="From"></label>' +
      '<label><span>To</span><input id="mail_compose_to" type="email" autocomplete="email"><button type="button" id="mail_compose_ccbcc" class="mail-compose-ccbcc" aria-expanded="false" aria-controls="mail_compose_cc mail_compose_bcc">Cc/Bcc</button></label>' +
      '<label id="mail_compose_cc_row" hidden><span>Cc</span><input id="mail_compose_cc" type="email" autocomplete="email" multiple></label>' +
      '<label id="mail_compose_bcc_row" hidden><span>Bcc</span><input id="mail_compose_bcc" type="email" autocomplete="email" multiple></label>' +
      '<label><span>Subject</span><input id="mail_compose_subject" type="text" autocomplete="off"></label>' +
      '</div>' +
      '<label class="mail-compose-body-label"><span>Message</span><textarea id="mail_compose_body" rows="12" aria-label="Message"></textarea></label>' +
      '<div class="mail-compose-footer">' +
      '<button type="button" class="mail-compose-unavailable-action" aria-label="Formatting options unavailable" aria-disabled="true" disabled><i class="fa fa-font" aria-hidden="true"></i></button>' +
      '<button type="button" class="mail-compose-unavailable-action" aria-label="Attach file unavailable" aria-disabled="true" disabled><i class="fa fa-paperclip" aria-hidden="true"></i></button>' +
      '<button type="button" class="mail-compose-unavailable-action" aria-label="More compose actions unavailable" aria-disabled="true" disabled><i class="fa fa-ellipsis-v" aria-hidden="true"></i></button>' +
      '<button type="button" id="mail_compose_discard" class="mail-compose-discard" aria-label="Discard draft"><i class="fa fa-trash" aria-hidden="true"></i></button>' +
      '</div>' +
      '<div id="mail_compose_status" class="mail-compose-status" aria-live="polite"></div>' +
      '<div id="mail_compose_error" class="mail-error mail-compose-error" aria-live="assertive" hidden></div>' +
      '</form>';
    content.appendChild(screen);
  }

  function composeScreenOpen() {
    var screen = $('#mail_compose_screen');
    return !!(screen && !screen.hidden);
  }

  function renderComposeButton() {
    var button = $('#mail_compose');
    if (!button) {
      return;
    }

    button.hidden = !activeAccount() || composeScreenOpen();
  }

  function composeDraftKey(accountId) {
    return 'caldaver.mail.compose.' + accountId;
  }

  function composeStorage() {
    try {
      return window.localStorage || null;
    } catch (error) {
      return null;
    }
  }

  function composeFields() {
    return {
      from: $('#mail_compose_from'),
      to: $('#mail_compose_to'),
      cc: $('#mail_compose_cc'),
      bcc: $('#mail_compose_bcc'),
      subject: $('#mail_compose_subject'),
      body: $('#mail_compose_body')
    };
  }

  function composeDraftValue() {
    var fields = composeFields();
    return {
      to: fields.to ? fields.to.value : '',
      cc: fields.cc ? fields.cc.value : '',
      bcc: fields.bcc ? fields.bcc.value : '',
      subject: fields.subject ? fields.subject.value : '',
      body: fields.body ? fields.body.value : '',
      ccBccVisible: !!($('#mail_compose_cc_row') && !$('#mail_compose_cc_row').hidden)
    };
  }

  function composeDraftHasContent(draft) {
    return !!(draft && (
      (draft.to || '').trim() ||
      (draft.cc || '').trim() ||
      (draft.bcc || '').trim() ||
      (draft.subject || '').trim() ||
      (draft.body || '').trim()
    ));
  }

  function setComposeStatus(message) {
    var status = $('#mail_compose_status');
    if (status) {
      status.textContent = message || '';
    }
  }

  function setComposeError(message) {
    var error = $('#mail_compose_error');
    if (!error) {
      return;
    }

    error.textContent = message || '';
    error.hidden = !message;
  }

  function setCcBccVisible(visible) {
    var ccRow = $('#mail_compose_cc_row');
    var bccRow = $('#mail_compose_bcc_row');
    var toggle = $('#mail_compose_ccbcc');
    if (!ccRow || !bccRow || !toggle) {
      return;
    }

    ccRow.hidden = !visible;
    bccRow.hidden = !visible;
    toggle.setAttribute('aria-expanded', visible ? 'true' : 'false');
  }

  function saveComposeDraft(showStatus) {
    var account = activeAccount();
    var storage = composeStorage();
    if (!account || !storage) {
      return;
    }

    var draft = composeDraftValue();
    try {
      if (composeDraftHasContent(draft)) {
        storage.setItem(composeDraftKey(account.id), JSON.stringify(draft));
      } else {
        storage.removeItem(composeDraftKey(account.id));
      }
      if (showStatus) {
        setComposeStatus('Saved on this device');
      }
    } catch (error) {
      setComposeStatus('Draft could not be saved on this device.');
    }
  }

  function loadComposeDraft(account) {
    var storage = composeStorage();
    if (!account || !storage) {
      return null;
    }

    try {
      var raw = storage.getItem(composeDraftKey(account.id));
      return raw ? JSON.parse(raw) : null;
    } catch (error) {
      return null;
    }
  }

  function clearComposeDraft(account) {
    var storage = composeStorage();
    if (!account || !storage) {
      return;
    }

    try {
      storage.removeItem(composeDraftKey(account.id));
    } catch (error) {
      return;
    }
  }

  function resetComposeFields() {
    var fields = composeFields();
    ['to', 'cc', 'bcc', 'subject', 'body'].forEach(function(name) {
      if (fields[name]) {
        fields[name].value = '';
      }
    });
    setCcBccVisible(false);
    setComposeStatus('');
    setComposeError('');
  }

  function restoreComposeDraft(account) {
    var fields = composeFields();
    var draft = loadComposeDraft(account);
    resetComposeFields();

    if (!draft) {
      return;
    }

    fields.to.value = draft.to || '';
    fields.cc.value = draft.cc || '';
    fields.bcc.value = draft.bcc || '';
    fields.subject.value = draft.subject || '';
    fields.body.value = draft.body || '';
    setCcBccVisible(!!(draft.ccBccVisible || draft.cc || draft.bcc));
    if (composeDraftHasContent(draft)) {
      setComposeStatus('Saved on this device');
    }
  }

  function openComposeScreen() {
    var account = activeAccount();
    var screen = $('#mail_compose_screen');
    if (!account || !screen) {
      return;
    }

    $('#mail_compose_from').value = account.email_address || account.label || '';
    restoreComposeDraft(account);
    screen.hidden = false;
    document.body.classList.add('mail-compose-open');
    renderComposeButton();
    window.setTimeout(function() {
      $('#mail_compose_to').focus();
    }, 0);
  }

  function closeComposeScreen() {
    var screen = $('#mail_compose_screen');
    if (!screen) {
      return;
    }

    saveComposeDraft(false);
    screen.hidden = true;
    document.body.classList.remove('mail-compose-open');
    renderComposeButton();
  }

  function showComposeSendUnavailable() {
    saveComposeDraft(true);
    setComposeError('Sending is not configured for this account yet. Your draft is only saved on this device.');
  }

  function discardComposeDraft() {
    var account = activeAccount();
    if (!account || !window.confirm('Discard this draft?')) {
      return;
    }

    clearComposeDraft(account);
    resetComposeFields();
    closeComposeScreen();
  }

  function bindComposeDraftAutosave() {
    ['#mail_compose_to', '#mail_compose_cc', '#mail_compose_bcc', '#mail_compose_subject', '#mail_compose_body'].forEach(function(selector) {
      var field = $(selector);
      if (!field) {
        return;
      }

      field.addEventListener('input', function() {
        setComposeError('');
        saveComposeDraft(true);
      });
    });
  }

  function refreshIntervalMs(account) {
    return Math.max(60, Number(account && account.refresh_interval_seconds || 60)) * 1000;
  }

  function scheduleAutoRefresh() {
    if (autoRefreshTimer !== null) {
      window.clearInterval(autoRefreshTimer);
      autoRefreshTimer = null;
    }

    var account = activeAccount();
    if (!account) {
      return;
    }

    autoRefreshTimer = window.setInterval(function() {
      syncMessages(++messageRequestId, { quiet: true });
    }, refreshIntervalMs(account));
  }

  function selectAccount(accountId, syncAfterLoad, scrollAfterSelect) {
    if (composeScreenOpen()) {
      saveComposeDraft(false);
    }
    activeAccountId = accountId;
    renderAccounts();
    renderComposeButton();
    if (composeScreenOpen()) {
      var account = activeAccount();
      $('#mail_compose_from').value = account ? (account.email_address || account.label || '') : '';
      restoreComposeDraft(account);
    }
    scheduleAutoRefresh();
    if (scrollAfterSelect) {
      scrollMailContentIntoView();
    }
    return loadMessages(syncAfterLoad);
  }

  function jsonFetch(url, options, fallbackMessage) {
    options = options || {};
    options.headers = options.headers || {};
    options.headers.Accept = 'application/json';
    options.headers['X-Requested-With'] = 'XMLHttpRequest';
    options.credentials = options.credentials || 'same-origin';
    var timeoutMs = Number(window.CALDAVER_MAIL_REQUEST_TIMEOUT_MS || defaultRequestTimeoutMs);
    var controller = typeof AbortController !== 'undefined' && !options.signal ? new AbortController() : null;
    var timeoutId = null;

    if (controller) {
      options.signal = controller.signal;
      timeoutId = window.setTimeout(function() {
        controller.abort();
      }, timeoutMs > 0 ? timeoutMs : defaultRequestTimeoutMs);
    }

    return fetch(url, options).then(function(response) {
      return response.text().then(function(body) {
        var payload = {};
        if (body) {
          try {
            payload = JSON.parse(body);
          } catch (error) {
            if (response.status === 401) {
              throw new Error('Your session expired. Reload Caldaver and sign in again.');
            }
            throw new Error(fallbackMessage || 'Unable to complete mail request');
          }
        }

        if (!response.ok) {
          throw new Error(payload.message || (response.status === 401 ? 'Your session expired. Reload Caldaver and sign in again.' : fallbackMessage) || 'Unable to complete mail request');
        }

        return payload;
      });
    }).catch(function(error) {
      if (error && error.name === 'AbortError') {
        throw new Error((fallbackMessage || 'Mail request') + ' because the server did not respond in time.');
      }
      throw error;
    }).finally(function() {
      if (timeoutId !== null) {
        window.clearTimeout(timeoutId);
      }
    });
  }

  function loadAccounts() {
    return jsonFetch(
      '{{ app.url_generator.generate('mail.accounts') }}',
      {},
      'Unable to load mail accounts'
    )
      .then(function(payload) {
        accounts = payload.data || [];
        var initialAccount = accounts.find(function(account) {
          return initialAccountId !== null && String(account.id) === String(initialAccountId);
        });
        activeAccountId = activeAccountId || (initialAccount && initialAccount.id) || (accounts[0] && accounts[0].id);
        setMailStatus('ready');
        renderAccounts();
        if (activeAccountId) {
          scheduleAutoRefresh();
          return loadMessages(true);
        }
      })
      .catch(function(error) {
        setMailStatus('error', error.message);
      });
  }

  function loadMessages(syncAfterLoad) {
    var account = activeAccount();
    var requestId = ++messageRequestId;
    clearMessages();
    $('#mail_account_title').textContent = account ? account.label : '{{ 'labels.mail'|trans }}';
    setMailStatus(account ? 'loading' : 'ready', account ? 'Checking the IMAP server for mail...' : '');
    renderMessages();

    if (!account) {
      return Promise.resolve();
    }

    if (account.password_needs_reset) {
      setMailStatus('error', resetPasswordMessage + ' Re-save the mail account password in Preferences.');
      renderMessages();
      return Promise.resolve();
    }

    return jsonFetch(
      '{{ app.url_generator.generate('mail.messages') }}?account_id=' + encodeURIComponent(account.id),
      {},
      'Unable to load mail'
    )
      .then(function(payload) {
        if (requestId !== messageRequestId || !account || activeAccountId !== account.id) {
          return;
        }
        replaceMessages(payload.data || []);
        if (syncAfterLoad) {
          renderMessages();
          return syncMessages(requestId);
        }
        setMailStatus('ready');
        renderMessages();
      })
      .catch(function(error) {
        if (requestId !== messageRequestId || !account || activeAccountId !== account.id) {
          return;
        }
        setMailStatus('error', error.message);
      });
  }

  function syncMessages(requestId, options) {
    var account = activeAccount();
    var quiet = options && options.quiet === true;
    if (!account) {
      return Promise.resolve();
    }

    if (!quiet) {
      setMailSyncing(true);
      setMailStatus('syncing', 'Syncing with the IMAP server...');
    }
    return jsonFetch(
      '{{ app.url_generator.generate('mail.messages.sync') }}?account_id=' + encodeURIComponent(account.id),
      {},
      'Unable to download new mail'
    )
      .then(function(payload) {
        if (requestId !== messageRequestId || !account || activeAccountId !== account.id) {
          return;
        }
        var changed = replaceMessages(payload.data || []);
        setMailStatus('ready');
        if (changed) {
          renderMessages();
        } else {
          renderMailStatus();
        }
      })
      .catch(function(error) {
        if (requestId !== messageRequestId || !account || activeAccountId !== account.id) {
          return;
        }
        if (!quiet || messages.length === 0) {
          setMailStatus('error', error.message);
        }
      })
      .finally(function() {
        if (!quiet) {
          setMailSyncing(false);
        }
      });
  }

  document.addEventListener('DOMContentLoaded', function() {
    ensureComposeControls();
    readMailQuery();
    setMailStatus('loading', 'Loading cached mail...');
    $('#mail_refresh').addEventListener('click', function() {
      syncMessages(++messageRequestId);
    });
    $('#mail_search').addEventListener('input', renderMessages);
    $('#mail_compose').addEventListener('click', openComposeScreen);
    $('#mail_compose_back').addEventListener('click', closeComposeScreen);
    $('#mail_compose_send').addEventListener('click', showComposeSendUnavailable);
    $('#mail_compose_ccbcc').addEventListener('click', function() {
      setCcBccVisible(true);
      saveComposeDraft(true);
      window.setTimeout(function() {
        $('#mail_compose_cc').focus();
      }, 0);
    });
    $('#mail_compose_discard').addEventListener('click', discardComposeDraft);
    bindComposeDraftAutosave();
    $('#mail_compose_form').addEventListener('submit', function(event) {
      event.preventDefault();
      showComposeSendUnavailable();
    });
    document.addEventListener('keydown', function(event) {
      if (!composeScreenOpen()) {
        return;
      }

      if (event.key === 'Escape') {
        event.preventDefault();
        closeComposeScreen();
        return;
      }

      if (event.key === 'Enter' && (event.ctrlKey || event.metaKey)) {
        event.preventDefault();
        showComposeSendUnavailable();
      }
    });
    window.addEventListener('resize', renderComposeButton);
    $('#mail_nav_item').addEventListener('click', function(event) {
      event.preventDefault();
      syncMessages(++messageRequestId);
    });

    loadAccounts();
  });
})();
</script>
