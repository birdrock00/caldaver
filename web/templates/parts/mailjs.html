<script>
(function() {
  var accounts = [];
  var messages = [];
  var activeAccountId = null;
  var messageRequestId = 0;
  var autoRefreshTimer = null;
  var activeSyncs = 0;
  var mailStatus = 'idle';
  var mailStatusMessage = '';
  var defaultRequestTimeoutMs = 20000;

  function $(selector) {
    return document.querySelector(selector);
  }

  function text(value) {
    return value || '';
  }

  function filteredMessages() {
    var filter = $('#mail_search').value.trim().toLowerCase();
    if (!filter) {
      return messages;
    }

    return messages.filter(function(message) {
      return [message.from, message.subject, message.date].join(' ').toLowerCase().indexOf(filter) !== -1;
    });
  }

  function renderAccounts() {
    var nav = $('#mail_accounts');
    nav.innerHTML = '';

    accounts.forEach(function(account) {
      var button = document.createElement('button');
      button.type = 'button';
      button.className = 'mail-account-tab' + (account.id === activeAccountId ? ' active' : '');
      button.dataset.accountId = account.id;
      button.innerHTML = '<i class="fa fa-inbox"></i><span></span><small></small>';
      button.querySelector('span').textContent = account.label;
      button.querySelector('small').textContent = account.email_address;
      button.addEventListener('click', function() {
        selectAccount(account.id, true, true);
      });
      nav.appendChild(button);
    });
  }

  function renderMessages() {
    var rows = $('#mail_rows');
    rows.innerHTML = '';

    var data = filteredMessages();

    data.forEach(function(message) {
      var row = document.createElement('article');
      row.className = 'mail-row' + (message.seen ? '' : ' unread');
      row.tabIndex = 0;
      row.setAttribute('role', 'button');
      row.innerHTML = '<span class="mail-from"></span><span class="mail-subject"></span><span class="mail-date"></span><div class="mail-attachments" data-testid="mail-attachments"></div>';
      row.querySelector('.mail-from').textContent = text(message.from);
      row.querySelector('.mail-subject').textContent = text(message.subject);
      row.querySelector('.mail-date').textContent = text(message.date);
      renderAttachments(row.querySelector('.mail-attachments'), message);
      row.dataset.messageHref = '{{ app.url_generator.generate('mail.read') }}' +
        '?account_id=' + encodeURIComponent(activeAccountId) +
        '&uid=' + encodeURIComponent(message.uid);
      row.addEventListener('click', function(event) {
        if (event.target.closest('a')) {
          return;
        }
        window.location.href = row.dataset.messageHref;
      });
      row.addEventListener('keydown', function(event) {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          window.location.href = row.dataset.messageHref;
        }
      });
      rows.appendChild(row);
    });

    renderMailStatus(data.length);
  }

  function renderAttachments(container, message, accountId) {
    var downloadAccountId = accountId || activeAccountId;
    container.innerHTML = '';
    (message.attachments || []).forEach(function(attachment) {
      var link = document.createElement('a');
      link.className = 'mail-attachment';
      link.setAttribute('data-testid', 'mail-attachment-download');
      link.dataset.filename = attachment.filename;
      link.href = '{{ app.url_generator.generate('mail.attachment') }}' +
        '?account_id=' + encodeURIComponent(downloadAccountId) +
        '&uid=' + encodeURIComponent(message.uid) +
        '&part=' + encodeURIComponent(attachment.part);
      link.textContent = attachment.filename;
      link.setAttribute('download', attachment.filename);
      container.appendChild(link);
    });
  }

  function activeAccount() {
    return accounts.find(function(account) {
      return account.id === activeAccountId;
    });
  }

  function setMailSyncing(syncing) {
    var nav = $('#mail_nav_item');
    if (!nav) {
      return;
    }

    if (syncing) {
      activeSyncs += 1;
      nav.classList.add('syncing');
      return;
    }

    activeSyncs = Math.max(0, activeSyncs - 1);
    if (activeSyncs === 0) {
      nav.classList.remove('syncing');
    }
  }

  function renderMailStatus(visibleMessageCount) {
    var account = activeAccount();
    var loading = mailStatus === 'loading' || mailStatus === 'syncing';
    var error = mailStatus === 'error';
    var count = typeof visibleMessageCount === 'number' ? visibleMessageCount : filteredMessages().length;

    $('#mail_loading').textContent = mailStatusMessage || 'Checking the IMAP server for mail...';
    $('#mail_loading').hidden = !loading;
    $('#mail_error').hidden = !error;
    $('#mail_no_messages').hidden = loading || error || !account || count > 0;
    $('#mail_empty').hidden = accounts.length > 0 || error || loading;
  }

  function setMailStatus(status, message) {
    mailStatus = status;
    mailStatusMessage = message || '';
    if (status === 'error') {
      $('#mail_error').textContent = mailStatusMessage;
    } else {
      $('#mail_error').hidden = true;
    }
    renderMailStatus();
  }

  function narrowViewport() {
    if (window.matchMedia) {
      return window.matchMedia('(max-width: 900px)').matches;
    }

    return window.innerWidth <= 900;
  }

  function scrollMailContentIntoView() {
    if (!narrowViewport()) {
      return;
    }

    window.requestAnimationFrame(function() {
      $('.mail-content').scrollIntoView({ block: 'start', behavior: 'smooth' });
    });
  }

  function refreshIntervalMs(account) {
    return Math.max(60, Number(account && account.refresh_interval_seconds || 60)) * 1000;
  }

  function scheduleAutoRefresh() {
    if (autoRefreshTimer !== null) {
      window.clearInterval(autoRefreshTimer);
      autoRefreshTimer = null;
    }

    var account = activeAccount();
    if (!account) {
      return;
    }

    autoRefreshTimer = window.setInterval(function() {
      syncMessages(++messageRequestId);
    }, refreshIntervalMs(account));
  }

  function selectAccount(accountId, syncAfterLoad, scrollAfterSelect) {
    activeAccountId = accountId;
    renderAccounts();
    scheduleAutoRefresh();
    if (scrollAfterSelect) {
      scrollMailContentIntoView();
    }
    return loadMessages(syncAfterLoad);
  }

  function jsonFetch(url, options, fallbackMessage) {
    options = options || {};
    options.headers = options.headers || {};
    options.headers.Accept = 'application/json';
    options.headers['X-Requested-With'] = 'XMLHttpRequest';
    options.credentials = options.credentials || 'same-origin';
    var timeoutMs = Number(window.CALDAVER_MAIL_REQUEST_TIMEOUT_MS || defaultRequestTimeoutMs);
    var controller = typeof AbortController !== 'undefined' && !options.signal ? new AbortController() : null;
    var timeoutId = null;

    if (controller) {
      options.signal = controller.signal;
      timeoutId = window.setTimeout(function() {
        controller.abort();
      }, timeoutMs > 0 ? timeoutMs : defaultRequestTimeoutMs);
    }

    return fetch(url, options).then(function(response) {
      return response.text().then(function(body) {
        var payload = {};
        if (body) {
          try {
            payload = JSON.parse(body);
          } catch (error) {
            if (response.status === 401) {
              throw new Error('Your session expired. Reload Caldaver and sign in again.');
            }
            throw new Error(fallbackMessage || 'Unable to complete mail request');
          }
        }

        if (!response.ok) {
          throw new Error(payload.message || (response.status === 401 ? 'Your session expired. Reload Caldaver and sign in again.' : fallbackMessage) || 'Unable to complete mail request');
        }

        return payload;
      });
    }).catch(function(error) {
      if (error && error.name === 'AbortError') {
        throw new Error((fallbackMessage || 'Mail request') + ' because the server did not respond in time.');
      }
      throw error;
    }).finally(function() {
      if (timeoutId !== null) {
        window.clearTimeout(timeoutId);
      }
    });
  }

  function loadAccounts() {
    return jsonFetch(
      '{{ app.url_generator.generate('mail.accounts') }}',
      {},
      'Unable to load mail accounts'
    )
      .then(function(payload) {
        accounts = payload.data || [];
        activeAccountId = activeAccountId || (accounts[0] && accounts[0].id);
        setMailStatus('ready');
        renderAccounts();
        if (activeAccountId) {
          scheduleAutoRefresh();
          return loadMessages(true);
        }
      })
      .catch(function(error) {
        setMailStatus('error', error.message);
      });
  }

  function loadMessages(syncAfterLoad) {
    var account = activeAccount();
    var requestId = ++messageRequestId;
    messages = [];
    $('#mail_account_title').textContent = account ? account.label : '{{ 'labels.mail'|trans }}';
    setMailStatus(account ? 'loading' : 'ready', account ? 'Checking the IMAP server for mail...' : '');
    renderMessages();

    if (!account) {
      return Promise.resolve();
    }

    return jsonFetch(
      '{{ app.url_generator.generate('mail.messages') }}?account_id=' + encodeURIComponent(account.id),
      {},
      'Unable to load mail'
    )
      .then(function(payload) {
        if (requestId !== messageRequestId || !account || activeAccountId !== account.id) {
          return;
        }
        messages = payload.data || [];
        if (syncAfterLoad) {
          renderMessages();
          return syncMessages(requestId);
        }
        setMailStatus('ready');
        renderMessages();
      })
      .catch(function(error) {
        if (requestId !== messageRequestId || !account || activeAccountId !== account.id) {
          return;
        }
        setMailStatus('error', error.message);
      });
  }

  function syncMessages(requestId) {
    var account = activeAccount();
    if (!account) {
      return Promise.resolve();
    }

    setMailSyncing(true);
    setMailStatus('syncing', 'Syncing with the IMAP server...');
    return jsonFetch(
      '{{ app.url_generator.generate('mail.messages.sync') }}?account_id=' + encodeURIComponent(account.id),
      {},
      'Unable to download new mail'
    )
      .then(function(payload) {
        if (requestId !== messageRequestId || !account || activeAccountId !== account.id) {
          return;
        }
        messages = payload.data || [];
        setMailStatus('ready');
        renderMessages();
      })
      .catch(function(error) {
        if (requestId !== messageRequestId || !account || activeAccountId !== account.id) {
          return;
        }
        setMailStatus('error', error.message);
      })
      .finally(function() {
        setMailSyncing(false);
      });
  }

  function openDialog() {
    $('#mail_account_form').reset();
    $('#mail_account_form input[name="id"]').value = '';
    $('#mail_account_error').hidden = true;
    $('#mail_account_error').textContent = '';
    $('#mail_account_dialog').hidden = false;
    $('#mail_account_form input[name="label"]').focus();
  }

  function closeDialog() {
    $('#mail_account_dialog').hidden = true;
  }

  document.addEventListener('DOMContentLoaded', function() {
    $('#mail_account_create').addEventListener('click', openDialog);
    $('#mail_account_cancel').addEventListener('click', closeDialog);
    $('#mail_account_cancel_icon').addEventListener('click', closeDialog);
    $('#mail_refresh').addEventListener('click', function() {
      syncMessages(++messageRequestId);
    });
    $('#mail_search').addEventListener('input', renderMessages);
    $('#mail_nav_item').addEventListener('click', function(event) {
      event.preventDefault();
      syncMessages(++messageRequestId);
    });

    $('#mail_account_form').addEventListener('submit', function(event) {
      event.preventDefault();
      jsonFetch(
        event.target.action,
        {
          method: 'POST',
          body: new FormData(event.target)
        },
        'Unable to save mail account'
      )
        .then(function(payload) {
          var index = accounts.findIndex(function(account) {
            return account.id === payload.data.id;
          });
          if (index === -1) {
            accounts.push(payload.data);
          } else {
            accounts[index] = payload.data;
          }
          activeAccountId = payload.data.id;
          closeDialog();
          $('#mail_account_error').hidden = true;
          renderAccounts();
          selectAccount(payload.data.id, true);
        })
        .catch(function(error) {
          $('#mail_account_error').textContent = error.message;
          $('#mail_account_error').hidden = false;
        });
    });

    loadAccounts();
  });
})();
</script>
