<script>
(function() {
  var swipeStart = null;
  var swipeNavigating = false;
  var swipeHandled = false;
  var inboxMessagesPromise = null;
  var messageNavigationPromise = null;
  var mobileViewportQuery = '(max-width: 900px)';
  var swipeMinDistance = 80;
  var swipeMaxVerticalDistance = 70;
  var swipeHorizontalRatio = 1.6;
  var messageByUid = {};
  var currentReplyUid = null;

  function $(selector) {
    return document.querySelector(selector);
  }

  function text(value) {
    return value || '';
  }

  function initials(value) {
    var source = text(value).replace(/<[^>]+>/g, '').trim();
    return (source.charAt(0) || '?').toUpperCase();
  }

  // [D7] pull a bare email address out of a "Name <email@host>" style From header, if present
  function extractEmail(value) {
    var match = text(value).match(/[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}/);
    return match ? match[0] : '';
  }

  // [D7] render the sender as a tap-to-email mailto link when a valid address can be found,
  // otherwise fall back to plain text so the header never breaks.
  function fillSenderNode(node, fromValue) {
    var raw = text(fromValue);
    var email = extractEmail(raw);
    node.textContent = '';
    if (!email) {
      node.textContent = raw;
      return;
    }

    var link = document.createElement('a');
    link.href = 'mailto:' + email;
    link.className = 'mail-reader-from-link';
    link.textContent = raw;
    link.setAttribute('aria-label', 'Email ' + email);
    node.appendChild(link);
  }

  function jsonFetch(url, options, fallbackMessage) {
    options = options || {};
    options.headers = options.headers || {};
    options.credentials = options.credentials || 'same-origin';
    options.headers.Accept = 'application/json';
    options.headers['X-Requested-With'] = 'XMLHttpRequest';

    return fetch(url, options).then(function(response) {
      return response.text().then(function(body) {
        var payload = {};
        if (body) {
          try {
            payload = JSON.parse(body);
          } catch (error) {
            throw new Error(fallbackMessage || 'Unable to load mail request');
          }
        }

        if (!response.ok) {
          throw new Error(payload.message || fallbackMessage || 'Unable to load mail request');
        }

        return payload;
      });
    });
  }

  function formFetch(url, data, fallbackMessage) {
    var form = new FormData();
    Object.keys(data).forEach(function(key) {
      form.append(key, data[key]);
    });

    return jsonFetch(url, {
      method: 'POST',
      body: form
    }, fallbackMessage);
  }

  function narrowViewport() {
    if (window.matchMedia) {
      return window.matchMedia(mobileViewportQuery).matches;
    }

    return window.innerWidth <= 900;
  }

  function renderAttachments(container, message, accountId, attachmentUrl) {
    container.innerHTML = '';
    (message.attachments || []).forEach(function(attachment) {
      var link = document.createElement('a');
      link.className = 'mail-attachment';
      link.setAttribute('data-testid', 'mail-attachment-download');
      link.dataset.filename = attachment.filename;
      link.href = attachmentUrl +
        '?account_id=' + encodeURIComponent(accountId) +
        '&uid=' + encodeURIComponent(message.uid) +
        '&part=' + encodeURIComponent(attachment.part);
      link.textContent = attachment.filename;
      link.setAttribute('download', attachment.filename);
      container.appendChild(link);
    });
  }

  function sanitizeHtml(html) {
    var template = document.createElement('template');
    template.innerHTML = html;
    var blockedTags = ['script', 'iframe', 'object', 'embed', 'applet', 'meta', 'base', 'link'];

    blockedTags.forEach(function(tagName) {
      template.content.querySelectorAll(tagName).forEach(function(node) {
        node.remove();
      });
    });

    template.content.querySelectorAll('*').forEach(function(node) {
      Array.prototype.slice.call(node.attributes).forEach(function(attribute) {
        var name = attribute.name.toLowerCase();
        var value = attribute.value || '';

        if (name.indexOf('on') === 0) {
          node.removeAttribute(attribute.name);
          return;
        }

        if ((name === 'href' || name === 'src' || name === 'xlink:href') && /^\s*javascript:/i.test(value)) {
          node.removeAttribute(attribute.name);
          return;
        }

        if (name === 'style' && /(expression\s*\(|javascript\s*:)/i.test(value)) {
          node.removeAttribute(attribute.name);
        }
      });
    });

    return template.innerHTML;
  }

  function resizeHtmlFrame(htmlFrame) {
    try {
      var doc = htmlFrame.contentWindow.document;
      htmlFrame.style.height = Math.max(
        340,
        doc.documentElement.scrollHeight,
        doc.body ? doc.body.scrollHeight : 0
      ) + 'px';
    } catch (error) {
      htmlFrame.style.height = '520px';
    }
  }

  function hideBrokenHtmlImage(image) {
    image.classList.add('caldaver-mail-image-failed');
    image.removeAttribute('srcset');
    image.removeAttribute('sizes');
    image.removeAttribute('width');
    image.removeAttribute('height');
    image.setAttribute('alt', '');
  }

  function proxiedImageUrl(source, accountId, uid, csrfToken) {
    if (!/^\s*https?:\/\//i.test(source || '')) {
      return source;
    }

    return '/mail/image?account_id=' + encodeURIComponent(accountId) +
      '&uid=' + encodeURIComponent(uid) +
      '&_token=' + encodeURIComponent(csrfToken) +
      '&url=' + encodeURIComponent(source.trim());
  }

  function proxyMailImages(html, accountId, uid, csrfToken) {
    var template = document.createElement('template');
    template.innerHTML = html;
    template.content.querySelectorAll('img').forEach(function(image) {
      var source = image.getAttribute('src') || '';
      if (source) {
        image.setAttribute('src', proxiedImageUrl(source, accountId, uid, csrfToken));
      }
      if (image.hasAttribute('srcset')) {
        image.removeAttribute('srcset');
      }
    });
    return template.innerHTML;
  }

  function renderBody(container, message, accountId, csrfToken) {
    var htmlFrame = container.querySelector('.mail-reader-html');
    var plainBody = container.querySelector('pre');
    var html = proxyMailImages(
      sanitizeHtml(text(message.html_body)),
      accountId,
      message.uid,
      csrfToken
    );

    if (html) {
      plainBody.hidden = true;
      plainBody.textContent = '';
      htmlFrame.hidden = false;
      htmlFrame.srcdoc = '<!doctype html><html><head><base target="_blank"><style>html,body{margin:0;padding:0;background:#fff;color:#202124;font:14px Arial,sans-serif;line-height:1.5;overflow-wrap:anywhere;touch-action:pan-y;}img{max-width:100%;height:auto;}img.caldaver-mail-image-failed{display:none!important;width:0!important;height:0!important;}table{max-width:100%;}</style></head><body>' + html + '</body></html>';
      htmlFrame.onload = function() {
        setupHtmlFrameSwipeNavigation(htmlFrame);
        resizeHtmlFrame(htmlFrame);
        try {
          Array.prototype.slice.call(htmlFrame.contentWindow.document.images).forEach(function(image) {
            image.addEventListener('load', function() { resizeHtmlFrame(htmlFrame); });
            image.addEventListener('error', function() {
              hideBrokenHtmlImage(image);
              resizeHtmlFrame(htmlFrame);
            });
            if (image.complete && image.naturalWidth === 0) {
              hideBrokenHtmlImage(image);
            }
          });
        } catch (error) {}
        window.setTimeout(function() { resizeHtmlFrame(htmlFrame); }, 250);
        window.setTimeout(function() {
          try {
            Array.prototype.slice.call(htmlFrame.contentWindow.document.images).forEach(function(image) {
              if (image.complete && image.naturalWidth === 0) {
                hideBrokenHtmlImage(image);
              }
            });
          } catch (error) {}
          resizeHtmlFrame(htmlFrame);
        }, 750);
        window.setTimeout(function() { resizeHtmlFrame(htmlFrame); }, 1500);
      };
      return;
    }

    htmlFrame.hidden = true;
    htmlFrame.removeAttribute('srcdoc');
    plainBody.hidden = false;
    plainBody.textContent = text(message.body);
  }

  function threadMessagesFromPayload(payload) {
    var data = payload.data || {};
    var candidates = [
      payload.thread,
      payload.thread_messages,
      payload.messages,
      data.thread,
      data.thread_messages,
      data.messages,
      Array.isArray(payload.data) ? payload.data : null
    ];

    for (var index = 0; index < candidates.length; index += 1) {
      if (Array.isArray(candidates[index]) && candidates[index].length > 0) {
        return candidates[index];
      }
    }

    return Array.isArray(data) ? [] : [data];
  }

  function primaryMessage(messages, uid) {
    var fallback = messages[0] || {};
    for (var index = 0; index < messages.length; index += 1) {
      if (String(messages[index].uid) === String(uid)) {
        return messages[index];
      }
    }

    return fallback;
  }

  function buildMessageElement(message, isPrimary, accountId, attachmentUrl, csrfToken) {
    var section = document.createElement('section');
    section.className = 'mail-thread-message';
    section.dataset.uid = message.uid;

    var header = document.createElement('div');
    header.className = 'mail-reader-message-header';

    var meta = document.createElement('div');
    meta.className = 'mail-reader-meta';

    var avatar = document.createElement('div');
    avatar.className = 'mail-reader-avatar';
    avatar.setAttribute('aria-hidden', 'true');
    avatar.textContent = initials(message.from);

    var textWrap = document.createElement('div');
    var from = document.createElement('strong');
    var date = document.createElement('span');
    if (isPrimary) {
      from.id = 'mail_reader_from';
      date.id = 'mail_reader_date';
    }
    // [D7] tap-to-email sender link in the message header
    fillSenderNode(from, message.from);
    date.textContent = text(message.date);
    textWrap.appendChild(from);
    textWrap.appendChild(date);

    meta.appendChild(avatar);
    meta.appendChild(textWrap);

    var reply = document.createElement('button');
    reply.type = 'button';
    reply.className = 'mail-reader-reply-button';
    reply.dataset.uid = message.uid;
    reply.setAttribute('aria-label', 'Reply to this message');
    if (isPrimary) {
      reply.id = 'mail_reader_reply';
    }
    reply.innerHTML = '<i class="fa fa-reply" aria-hidden="true"></i><span>Reply</span>';
    reply.addEventListener('click', function(event) {
      event.stopPropagation();
      openReplyComposer(message);
    });

    header.appendChild(meta);
    header.appendChild(reply);
    section.appendChild(header);

    var plainBody = document.createElement('pre');
    if (isPrimary) {
      plainBody.id = 'mail_reader_body';
    }
    // [D7] wrap long plain-text bodies (and long unbroken URLs) so they never force horizontal scroll on phones
    plainBody.className = 'mail-reader-plain mail-reader-wrap';
    section.appendChild(plainBody);

    var htmlFrame = document.createElement('iframe');
    if (isPrimary) {
      htmlFrame.id = 'mail_reader_html';
    }
    htmlFrame.className = 'mail-reader-html';
    htmlFrame.setAttribute('sandbox', 'allow-same-origin allow-popups allow-popups-to-escape-sandbox');
    htmlFrame.setAttribute('referrerpolicy', 'no-referrer');
    htmlFrame.setAttribute('title', 'Mail');
    htmlFrame.hidden = true;
    section.appendChild(htmlFrame);

    var attachments = document.createElement('div');
    if (isPrimary) {
      attachments.id = 'mail_reader_attachments';
    }
    attachments.className = 'mail-attachments';
    attachments.setAttribute('data-testid', 'mail-attachments');
    section.appendChild(attachments);

    renderBody(section, message, accountId, csrfToken);
    renderAttachments(attachments, message, accountId, attachmentUrl);

    return section;
  }

  function renderThread(messages, accountId, selectedUid, attachmentUrl, csrfToken) {
    var thread = $('#mail_reader_thread');
    var selected = primaryMessage(messages, selectedUid);
    var hasSelected = false;

    thread.innerHTML = '';
    messageByUid = {};

    messages.forEach(function(message) {
      var uid = String(message.uid || selectedUid);
      message.uid = message.uid || selectedUid;
      messageByUid[uid] = message;
      if (String(message.uid) === String(selectedUid)) {
        hasSelected = true;
      }
    });

    messages.forEach(function(message, index) {
      thread.appendChild(buildMessageElement(
        message,
        hasSelected ? String(message.uid) === String(selectedUid) : index === 0,
        accountId,
        attachmentUrl,
        csrfToken
      ));
    });

    $('#mail_reader_subject').textContent = text(selected.subject);
  }

  function replyStorage() {
    try {
      return window.localStorage || null;
    } catch (error) {
      return null;
    }
  }

  function replyDraftKey(accountId, uid) {
    return 'caldaver.mail.reply.' + accountId + '.' + uid;
  }

  function replyFields() {
    return {
      to: $('#mail_reply_to'),
      subject: $('#mail_reply_subject'),
      body: $('#mail_reply_body')
    };
  }

  function replyDraftValue() {
    var fields = replyFields();
    return {
      to: fields.to ? fields.to.value : '',
      subject: fields.subject ? fields.subject.value : '',
      body: fields.body ? fields.body.value : ''
    };
  }

  function replyDraftHasContent(draft) {
    return !!(draft && (
      (draft.to || '').trim() ||
      (draft.subject || '').trim() ||
      (draft.body || '').trim()
    ));
  }

  function setReplyStatus(message) {
    var status = $('#mail_reply_status');
    if (status) {
      status.textContent = message || '';
    }
  }

  function setReplyError(message) {
    var error = $('#mail_reply_error');
    if (!error) {
      return;
    }

    error.textContent = message || '';
    error.hidden = !message;
  }

  function saveReplyDraft(showStatus) {
    var reader = $('#mail_reader');
    var storage = replyStorage();
    if (!currentReplyUid || !storage) {
      return;
    }

    var draft = replyDraftValue();
    try {
      if (replyDraftHasContent(draft)) {
        storage.setItem(replyDraftKey(reader.dataset.accountId, currentReplyUid), JSON.stringify(draft));
      } else {
        storage.removeItem(replyDraftKey(reader.dataset.accountId, currentReplyUid));
      }
      if (showStatus) {
        setReplyStatus('Saved on this device');
      }
    } catch (error) {
      setReplyStatus('Draft could not be saved on this device.');
    }
  }

  function loadReplyDraft(accountId, uid) {
    var storage = replyStorage();
    if (!storage) {
      return null;
    }

    try {
      var raw = storage.getItem(replyDraftKey(accountId, uid));
      return raw ? JSON.parse(raw) : null;
    } catch (error) {
      return null;
    }
  }

  function clearReplyDraft(accountId, uid) {
    var storage = replyStorage();
    if (!storage) {
      return;
    }

    try {
      storage.removeItem(replyDraftKey(accountId, uid));
    } catch (error) {}
  }

  function replySubject(subject) {
    var value = text(subject).trim();
    if (/^re\s*:/i.test(value)) {
      return value;
    }

    return value ? 'Re: ' + value : 'Re:';
  }

  function quotedOriginal(message) {
    var body = text(message.body).trim();
    if (!body) {
      return '\n\n';
    }

    var intro = 'On ' + text(message.date) + ', ' + text(message.from) + ' wrote:';
    var quoted = body.split(/\r?\n/).map(function(line) {
      return '> ' + line;
    }).join('\n');
    return '\n\n' + intro + '\n' + quoted;
  }

  function resetReplyFields() {
    var fields = replyFields();
    fields.to.value = '';
    fields.subject.value = '';
    fields.body.value = '';
    setReplyStatus('');
    setReplyError('');
  }

  function openReplyComposer(message) {
    var reader = $('#mail_reader');
    var composer = $('#mail_reply_composer');
    var fields = replyFields();
    var uid = message.uid || reader.dataset.uid;
    var draft;

    if (!composer) {
      return;
    }

    if (currentReplyUid && String(currentReplyUid) !== String(uid)) {
      saveReplyDraft(false);
    }

    currentReplyUid = uid;
    resetReplyFields();
    draft = loadReplyDraft(reader.dataset.accountId, uid);

    if (draft) {
      fields.to.value = draft.to || '';
      fields.subject.value = draft.subject || '';
      fields.body.value = draft.body || '';
      if (replyDraftHasContent(draft)) {
        setReplyStatus('Saved on this device');
      }
    } else {
      fields.to.value = text(message.from);
      fields.subject.value = replySubject(message.subject);
      fields.body.value = quotedOriginal(message);
    }

    composer.hidden = false;
    window.requestAnimationFrame(function() {
      composer.scrollIntoView({ block: 'nearest' });
      (fields.to.value.trim() ? fields.body : fields.to).focus();
    });
  }

  function closeReplyComposer() {
    var composer = $('#mail_reply_composer');
    if (!composer) {
      return;
    }

    saveReplyDraft(false);
    composer.hidden = true;
    setReplyError('');
  }

  function showReplySendUnavailable() {
    saveReplyDraft(true);
    setReplyError('Sending is not configured for this account yet. Your reply draft is only saved on this device.');
  }

  function discardReplyDraft() {
    var reader = $('#mail_reader');
    if (!currentReplyUid || !window.confirm('Discard this reply draft?')) {
      return;
    }

    clearReplyDraft(reader.dataset.accountId, currentReplyUid);
    resetReplyFields();
    $('#mail_reply_composer').hidden = true;
    currentReplyUid = null;
  }

  function bindReplyComposer() {
    ['#mail_reply_to', '#mail_reply_subject', '#mail_reply_body'].forEach(function(selector) {
      var field = $(selector);
      if (!field) {
        return;
      }

      field.addEventListener('input', function() {
        setReplyError('');
        saveReplyDraft(true);
      });
    });

    $('#mail_reply_close').addEventListener('click', closeReplyComposer);
    $('#mail_reply_send').addEventListener('click', showReplySendUnavailable);
    $('#mail_reply_discard').addEventListener('click', discardReplyDraft);
    $('#mail_reply_form').addEventListener('submit', function(event) {
      event.preventDefault();
      showReplySendUnavailable();
    });
    $('#mail_reply_form').addEventListener('keydown', function(event) {
      if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
        event.preventDefault();
        showReplySendUnavailable();
      }
    });
    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape' && !$('#mail_reply_composer').hidden) {
        event.preventDefault();
        closeReplyComposer();
      }
    });
  }

  function loadMessage() {
    var reader = $('#mail_reader');
    var accountId = reader.dataset.accountId;
    var uid = reader.dataset.uid;
    var url = reader.dataset.messageUrl + '?account_id=' + encodeURIComponent(accountId) + '&uid=' + encodeURIComponent(uid);

    $('#mail_reader_error').hidden = true;
    $('#mail_reader_message').hidden = true;
    $('#mail_reader_loading').hidden = false;

    jsonFetch(url, {}, 'Unable to load message')
      .then(function(payload) {
        var messages = threadMessagesFromPayload(payload);
        renderThread(messages, accountId, uid, reader.dataset.attachmentUrl, reader.dataset.csrfToken);
        if (currentReplyUid && messageByUid[String(currentReplyUid)]) {
          openReplyComposer(messageByUid[String(currentReplyUid)]);
        }
        $('#mail_reader_loading').hidden = true;
        $('#mail_reader_message').hidden = false;
        $('#mail_reader_unread').hidden = false;
      })
      .catch(function(error) {
        $('#mail_reader_loading').hidden = true;
        $('#mail_reader_error').textContent = error.message;
        $('#mail_reader_error').hidden = false;
      });
  }

  function loadInboxMessages(reader) {
    if (inboxMessagesPromise !== null) {
      return inboxMessagesPromise;
    }

    inboxMessagesPromise = jsonFetch(
      reader.dataset.messagesUrl + '?account_id=' + encodeURIComponent(reader.dataset.accountId),
      {},
      'Unable to load inbox messages'
    ).then(function(payload) {
      return payload.data || [];
    }).catch(function(error) {
      inboxMessagesPromise = null;
      throw error;
    });

    return inboxMessagesPromise;
  }

  function messageReadUrl(reader, uid) {
    return reader.dataset.readUrl +
      '?account_id=' + encodeURIComponent(reader.dataset.accountId) +
      '&uid=' + encodeURIComponent(uid);
  }

  function messageNavigationState(messages, uid) {
    var currentIndex = -1;
    messages.forEach(function(message, index) {
      if (String(message.uid) === String(uid)) {
        currentIndex = index;
      }
    });

    return {
      currentIndex: currentIndex,
      previous: currentIndex > 0 ? messages[currentIndex - 1] : null,
      next: currentIndex !== -1 && currentIndex < messages.length - 1 ? messages[currentIndex + 1] : null
    };
  }

  function messageNavigationFromPayload(payload) {
    var data = payload.data || {};
    return {
      previous: data.previous ? { uid: data.previous } : null,
      next: data.next ? { uid: data.next } : null
    };
  }

  function loadMessageNavigation(reader) {
    if (messageNavigationPromise !== null) {
      return messageNavigationPromise;
    }

    if (!reader.dataset.navigationUrl) {
      return loadInboxMessages(reader).then(function(messages) {
        return messageNavigationState(messages, reader.dataset.uid);
      });
    }

    messageNavigationPromise = jsonFetch(
      reader.dataset.navigationUrl +
        '?account_id=' + encodeURIComponent(reader.dataset.accountId) +
        '&uid=' + encodeURIComponent(reader.dataset.uid),
      {},
      'Unable to load message navigation'
    ).then(messageNavigationFromPayload).catch(function(error) {
      messageNavigationPromise = null;
      throw error;
    });

    return messageNavigationPromise;
  }

  function navigateTo(url) {
    if (typeof window.CALDAVER_MAIL_NAVIGATE === 'function') {
      window.CALDAVER_MAIL_NAVIGATE(url);
      return;
    }

    window.location.href = url;
  }

  function navigateBySwipe(direction) {
    if (swipeNavigating) {
      return Promise.resolve();
    }

    var reader = $('#mail_reader');
    $('#mail_reader_error').hidden = true;

    return loadMessageNavigation(reader)
      .then(function(state) {
        var target = direction === 'newer' ? state.previous : state.next;
        if (!target) {
          return;
        }

        swipeNavigating = true;
        navigateTo(messageReadUrl(reader, target.uid));
      })
      .catch(function(error) {
        $('#mail_reader_error').textContent = error.message;
        $('#mail_reader_error').hidden = false;
      });
  }

  function updateMessageNavButtons() {
    var reader = $('#mail_reader');
    var previousButton = $('#mail_reader_previous');
    var nextButton = $('#mail_reader_next');

    if (!previousButton || !nextButton) {
      return Promise.resolve();
    }

    previousButton.disabled = true;
    nextButton.disabled = true;

    return loadMessageNavigation(reader)
      .then(function(state) {
        previousButton.disabled = !state.previous;
        nextButton.disabled = !state.next;
      })
      .catch(function() {
        previousButton.disabled = true;
        nextButton.disabled = true;
      });
  }

  function beginSwipe(clientX, clientY) {
    swipeStart = { x: clientX, y: clientY };
    swipeHandled = false;
  }

  function swipeDirection(clientX, clientY) {
    if (!swipeStart || !narrowViewport()) {
      swipeStart = null;
      return null;
    }

    var deltaX = clientX - swipeStart.x;
    var deltaY = clientY - swipeStart.y;

    if (Math.abs(deltaX) < swipeMinDistance ||
        Math.abs(deltaY) > swipeMaxVerticalDistance ||
        Math.abs(deltaX) < Math.abs(deltaY) * swipeHorizontalRatio) {
      return null;
    }

    return deltaX > 0 ? 'newer' : 'older';
  }

  function preventNativeHorizontalScroll(event) {
    if (event && event.cancelable) {
      event.preventDefault();
    }
  }

  function handleSwipeProgress(clientX, clientY, event) {
    if (swipeHandled) {
      preventNativeHorizontalScroll(event);
      return;
    }

    var direction = swipeDirection(clientX, clientY);
    if (!direction) {
      return;
    }

    swipeHandled = true;
    swipeStart = null;
    preventNativeHorizontalScroll(event);
    navigateBySwipe(direction);
  }

  function finishSwipe(clientX, clientY, event) {
    if (swipeHandled) {
      swipeHandled = false;
      swipeStart = null;
      preventNativeHorizontalScroll(event);
      return;
    }

    var direction = swipeDirection(clientX, clientY);
    swipeStart = null;
    swipeHandled = false;

    if (direction) {
      preventNativeHorizontalScroll(event);
      navigateBySwipe(direction);
    }
  }

  function touchPoint(event) {
    var touches = event.changedTouches && event.changedTouches.length > 0 ? event.changedTouches : event.touches;
    if (!touches || touches.length === 0) {
      return null;
    }

    return touches[0];
  }

  function interactiveSwipeTarget(target) {
    return !!(target && target.closest && target.closest('a, button, input, textarea, select, label'));
  }

  function bindSwipeNavigationTarget(target, captureTarget) {
    target.addEventListener('touchstart', function(event) {
      if (!narrowViewport() || event.touches.length !== 1 || interactiveSwipeTarget(event.target)) {
        swipeStart = null;
        swipeHandled = false;
        return;
      }

      var point = touchPoint(event);
      if (point) {
        beginSwipe(point.clientX, point.clientY);
      } else {
        swipeStart = null;
        swipeHandled = false;
      }
    }, { passive: true, capture: true });

    target.addEventListener('touchmove', function(event) {
      var point = touchPoint(event);
      if (point) {
        handleSwipeProgress(point.clientX, point.clientY, event);
      }
    }, { passive: false, capture: true });

    target.addEventListener('touchend', function(event) {
      var point = touchPoint(event);
      if (!point) {
        swipeStart = null;
        swipeHandled = false;
        return;
      }

      finishSwipe(point.clientX, point.clientY, event);
    }, { passive: false, capture: true });

    target.addEventListener('touchcancel', function() {
      swipeStart = null;
      swipeHandled = false;
    }, { passive: true, capture: true });

    target.addEventListener('pointerdown', function(event) {
      if (!narrowViewport() || interactiveSwipeTarget(event.target) || (event.pointerType !== 'touch' && event.pointerType !== 'pen')) {
        return;
      }

      beginSwipe(event.clientX, event.clientY);
      if (captureTarget && captureTarget.setPointerCapture) {
        try {
          captureTarget.setPointerCapture(event.pointerId);
        } catch (error) {}
      }
    }, true);

    target.addEventListener('pointerup', function(event) {
      if (event.pointerType !== 'touch' && event.pointerType !== 'pen') {
        return;
      }

      finishSwipe(event.clientX, event.clientY, event);
    }, true);

    target.addEventListener('pointermove', function(event) {
      if (event.pointerType !== 'touch' && event.pointerType !== 'pen') {
        return;
      }

      handleSwipeProgress(event.clientX, event.clientY, event);
    }, true);

    target.addEventListener('pointercancel', function() {
      swipeStart = null;
      swipeHandled = false;
    }, true);

    target.addEventListener('mousedown', function(event) {
      if (!narrowViewport() || event.button !== 0 || interactiveSwipeTarget(event.target)) {
        return;
      }

      beginSwipe(event.clientX, event.clientY);
    }, true);

    target.addEventListener('mouseup', function(event) {
      if (event.button !== 0) {
        return;
      }

      finishSwipe(event.clientX, event.clientY, event);
    }, true);
  }

  function setupHtmlFrameSwipeNavigation(htmlFrame) {
    try {
      if (!htmlFrame.contentWindow || !htmlFrame.contentWindow.document) {
        return;
      }

      bindSwipeNavigationTarget(htmlFrame.contentWindow.document, htmlFrame);
    } catch (error) {}
  }

  function setupSwipeNavigation() {
    var reader = $('#mail_reader');
    var message = $('#mail_reader_message');

    if (reader) {
      bindSwipeNavigationTarget(reader, reader);
    }

    bindSwipeNavigationTarget(message, message);
  }

  function markUnread() {
    var reader = $('#mail_reader');
    $('#mail_reader_error').hidden = true;

    return formFetch(reader.dataset.unreadUrl, {
      _token: reader.dataset.csrfToken,
      account_id: reader.dataset.accountId,
      uid: reader.dataset.uid
    }, 'Unable to mark message unread')
      .then(function() {
        navigateTo(reader.dataset.inboxUrl +
          '?account_id=' + encodeURIComponent(reader.dataset.accountId) +
          '&unread_uid=' + encodeURIComponent(reader.dataset.uid));
      })
      .catch(function(error) {
        $('#mail_reader_error').textContent = error.message;
        $('#mail_reader_error').hidden = false;
      });
  }

  // [D8] apply mobile keyboard hints to the reply recipient field (markup lives in a template
  // owned by another agent, so we enhance it defensively from here at runtime).
  function applyReplyMobileInputHints() {
    var to = $('#mail_reply_to');
    if (to) {
      to.setAttribute('inputmode', 'email');
      to.setAttribute('enterkeyhint', 'next');
      to.setAttribute('autocapitalize', 'none');
      to.setAttribute('autocorrect', 'off');
      to.setAttribute('spellcheck', 'false');
    }
    var subject = $('#mail_reply_subject');
    if (subject) {
      subject.setAttribute('enterkeyhint', 'next');
      subject.setAttribute('autocapitalize', 'sentences');
    }
    var body = $('#mail_reply_body');
    if (body) {
      body.setAttribute('enterkeyhint', 'enter');
    }
  }

  document.addEventListener('DOMContentLoaded', function() {
    applyReplyMobileInputHints();
    $('#mail_reader_refresh').addEventListener('click', loadMessage);
    $('#mail_reader_unread').addEventListener('click', markUnread);
    $('#mail_reader_previous').addEventListener('click', function() {
      navigateBySwipe('newer');
    });
    $('#mail_reader_next').addEventListener('click', function() {
      navigateBySwipe('older');
    });
    setupSwipeNavigation();
    bindReplyComposer();
    updateMessageNavButtons();
    loadMessage();
  });
})();
</script>
