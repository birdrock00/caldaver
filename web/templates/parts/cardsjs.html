<script>
(function() {
  var contacts = [];
  var view = 'list';
  var userSelectedView = false;
  var contactsLoading = true;
  var lastContactCardTap = { card: null, at: 0 };
  var contactCardDoubleTapMs = 550;
  var colors = ['#3367d6', '#188038', '#9334e6', '#d93025', '#00897b', '#5f6368', '#c5221f', '#7b1fa2'];

  function $(selector) {
    return document.querySelector(selector);
  }

  function text(value) {
    return value || '';
  }

  function formBody(formData) {
    return new URLSearchParams(Array.from(formData.entries()));
  }

  function initials(contact) {
    return contact.initial || text(contact.full_name).charAt(0).toUpperCase() || '?';
  }

  function contactMatches(contact, filter) {
    if (!filter) {
      return true;
    }

    var haystack = [
      contact.full_name,
      contact.email,
      contact.phone,
      contact.organization,
      contact.job_title
    ].join(' ').toLowerCase();

    return haystack.indexOf(filter.toLowerCase()) !== -1;
  }

  function filteredContacts() {
    var filter = $('#contacts_search').value.trim();
    return contacts.filter(function(contact) {
      return contactMatches(contact, filter);
    });
  }

  function contactAvatar(contact) {
    var avatar = document.createElement('span');
    avatar.className = 'contact-avatar';
    avatar.style.background = contact.avatar_color || colors[Math.abs(text(contact.full_name).length) % colors.length];
    avatar.textContent = initials(contact);
    return avatar;
  }

  function capacitorPlugin(name) {
    return window.Capacitor &&
      window.Capacitor.Plugins &&
      window.Capacitor.Plugins[name];
  }

  function capacitorPlatform() {
    if (!window.Capacitor) {
      return '';
    }

    if (typeof window.Capacitor.getPlatform === 'function') {
      return window.Capacitor.getPlatform();
    }

    return window.Capacitor.platform || '';
  }

  function isInstalledAndroidApp() {
    if (!window.Capacitor) {
      return false;
    }

    if (typeof window.Capacitor.isNativePlatform === 'function' && !window.Capacitor.isNativePlatform()) {
      return false;
    }

    return capacitorPlatform() === 'android';
  }

  function contactHasDialablePhone(contact) {
    return text(contact.phone).trim().length > 0;
  }

  function telHref(phone) {
    return 'tel:' + text(phone).trim().replace(/\s+/g, '');
  }

  function initiateContactCall(contact) {
    window.open(telHref(contact.phone), '_self');
  }

  function confirmAndDialContact(contact) {
    var dialog = capacitorPlugin('Dialog');

    if (!isInstalledAndroidApp() || !contactHasDialablePhone(contact) || !dialog || typeof dialog.confirm !== 'function') {
      return;
    }

    Promise.resolve(dialog.confirm({
      title: 'Dial contact',
      message: 'Dial ' + (contact.full_name || 'this contact') + ' at ' + text(contact.phone).trim() + '?',
      okButtonTitle: 'Dial',
      cancelButtonTitle: 'Cancel'
    })).then(function(result) {
      if (result && result.value === true) {
        initiateContactCall(contact);
      }
    });
  }

  function isInteractiveContactCardTarget(target, card) {
    return !!(target && target.closest && target.closest('button, a, input, select, textarea, label') && card.contains(target.closest('button, a, input, select, textarea, label')));
  }

  function handleContactCardTap(contact, card, event) {
    if (view !== 'cards' || !isInstalledAndroidApp() || !contactHasDialablePhone(contact) || isInteractiveContactCardTarget(event.target, card)) {
      return;
    }

    var now = event.timeStamp || Date.now();
    if (lastContactCardTap.card === card && now - lastContactCardTap.at > 0 && now - lastContactCardTap.at <= contactCardDoubleTapMs) {
      lastContactCardTap = { card: null, at: 0 };
      event.preventDefault();
      confirmAndDialContact(contact);
      return;
    }

    lastContactCardTap = { card: card, at: now };
  }

  function handleContactCardDoubleClick(contact, card, event) {
    if (view !== 'cards' || !isInstalledAndroidApp() || !contactHasDialablePhone(contact) || isInteractiveContactCardTarget(event.target, card)) {
      return;
    }

    lastContactCardTap = { card: null, at: 0 };
    event.preventDefault();
    confirmAndDialContact(contact);
  }

  function renderList(data) {
    var rows = $('#contacts_rows');
    rows.innerHTML = '';
    data.forEach(function(contact) {
      var row = document.createElement('div');
      row.className = 'contact-row';
      row.innerHTML =
        '<div class="contact-name-cell"><span class="contact-name"></span></div>' +
        '<div></div><div></div><div></div><div class="contact-labels"></div>' +
        '<div class="contact-actions-cell"><button type="button" class="contact-edit" title="Edit"><i class="fa fa-pencil"></i></button><button type="button" class="contact-delete" title="{{ 'labels.delete'|trans }}"><i class="fa fa-trash"></i></button></div>';
      row.children[0].insertBefore(contactAvatar(contact), row.children[0].firstChild);
      row.querySelector('.contact-name').textContent = contact.full_name;
      row.children[1].textContent = text(contact.email);
      row.children[2].textContent = text(contact.phone);
      row.children[3].textContent = text(contact.company_line);
      row.children[4].textContent = (contact.labels || []).join(', ');
      row.querySelector('.contact-edit').addEventListener('click', function() {
        openDialog(contact);
      });
      row.querySelector('.contact-delete').addEventListener('click', function(event) {
        deleteContact(contact, event.currentTarget);
      });
      rows.appendChild(row);
    });
  }

  function renderCards(data) {
    var grid = $('#contacts_cards');
    grid.innerHTML = '';
    data.forEach(function(contact) {
      var card = document.createElement('article');
      card.className = 'contact-card';
      card.addEventListener('touchend', function(event) {
        handleContactCardTap(contact, card, event);
      });
      card.addEventListener('dblclick', function(event) {
        handleContactCardDoubleClick(contact, card, event);
      });
      card.appendChild(contactAvatar(contact));

      var name = document.createElement('h2');
      name.textContent = contact.full_name;
      card.appendChild(name);

      var meta = document.createElement('p');
      meta.textContent = text(contact.email) || text(contact.phone) || text(contact.company_line);
      card.appendChild(meta);

      var detail = document.createElement('dl');
      detail.innerHTML =
        '<dt>Email</dt><dd></dd>' +
        '<dt>Phone</dt><dd></dd>' +
        '<dt>Company</dt><dd></dd>';
      detail.children[1].textContent = text(contact.email);
      detail.children[3].textContent = text(contact.phone);
      detail.children[5].textContent = text(contact.company_line);
      card.appendChild(detail);

      var editButton = document.createElement('button');
      editButton.type = 'button';
      editButton.className = 'contact-edit card-edit';
      editButton.title = 'Edit';
      editButton.innerHTML = '<i class="fa fa-pencil"></i>';
      editButton.addEventListener('click', function() {
        openDialog(contact);
      });
      card.appendChild(editButton);

      var deleteButton = document.createElement('button');
      deleteButton.type = 'button';
      deleteButton.className = 'contact-delete card-delete';
      deleteButton.title = '{{ 'labels.delete'|trans }}';
      deleteButton.innerHTML = '<i class="fa fa-trash"></i>';
      deleteButton.addEventListener('click', function(event) {
        deleteContact(contact, event.currentTarget);
      });
      card.appendChild(deleteButton);
      grid.appendChild(card);
    });
  }

  function render() {
    var data = filteredContacts();
    $('#contact_count').textContent = contactsLoading ? 'Loading...' : (data.length > 0 ? '(' + data.length + ')' : '');
    $('#contact_count_nav').textContent = contactsLoading ? '...' : (contacts.length > 0 ? contacts.length : '');
    $('#contacts_loading').hidden = !contactsLoading;
    $('#contacts_empty').hidden = contactsLoading || data.length > 0;
    $('#contacts_list').hidden = contactsLoading || view !== 'list';
    $('#contacts_cards').hidden = contactsLoading || view !== 'cards';

    renderList(data);
    renderCards(data);
  }

  function narrowViewport() {
    if (window.matchMedia) {
      return window.matchMedia('(max-width: 900px)').matches;
    }

    return window.innerWidth <= 900;
  }

  function defaultContactView() {
    return narrowViewport() ? 'cards' : 'list';
  }

  function setContactView(nextView) {
    view = nextView;
    document.querySelectorAll('.contacts-view-switch button').forEach(function(button) {
      button.classList.toggle('active', button.dataset.view === view);
    });
    render();
  }

  function loadContacts() {
    contactsLoading = true;
    render();

    return fetch('{{ app.url_generator.generate('cards.list') }}', {
      credentials: 'same-origin',
      headers: { 'Accept': 'application/json' }
    })
      .then(function(response) {
        if (!response.ok) {
          throw new Error('Unable to load contacts');
        }
        return response.json();
      })
      .then(function(payload) {
        contacts = payload.data || [];
        contactsLoading = false;
        render();
      })
      .catch(function(error) {
        contactsLoading = false;
        $('#contact_count').textContent = '';
        $('#contact_count_nav').textContent = '';
        $('#contacts_loading').hidden = true;
        $('#contacts_empty').hidden = true;
        $('#contacts_rows').innerHTML = '<div class="contacts-error">' + error.message + '</div>';
        $('#contacts_cards').innerHTML = '<div class="contacts-error">' + error.message + '</div>';
      });
  }

  function deleteContact(contact, button) {
    if (button && button.disabled) {
      return;
    }

    if (!window.confirm('Delete ' + (contact.full_name || 'this contact') + '?')) {
      return;
    }

    if (button) {
      button.disabled = true;
    }

    var formData = new FormData();
    formData.append('_token', $('#contact_form input[name="_token"]').value);
    formData.append('url', contact.url);
    formData.append('etag', contact.etag || '');

    fetch('{{ app.url_generator.generate('cards.delete') }}', {
      method: 'POST',
      credentials: 'same-origin',
      headers: {
        'Accept': 'application/json',
        'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
      },
      body: formBody(formData)
    })
      .then(function(response) {
        if (!response.ok) {
          throw new Error('Unable to delete contact');
        }
        return response.json();
      })
      .then(function() {
        contacts = contacts.filter(function(item) {
          return item.url !== contact.url;
        });
        render();
      })
      .catch(function(error) {
        $('#contacts_rows').innerHTML = '<div class="contacts-error">' + error.message + '</div>';
        $('#contacts_cards').innerHTML = '<div class="contacts-error">' + error.message + '</div>';
        if (button) {
          button.disabled = false;
        }
      });
  }

  function openDialog(contact) {
    var form = $('#contact_form');
    form.reset();
    form.action = contact && contact.url ? '{{ app.url_generator.generate('cards.update') }}' : '{{ app.url_generator.generate('cards.save') }}';
    form.elements.url.value = contact && contact.url ? contact.url : '';
    form.elements.etag.value = contact && contact.etag ? contact.etag : '';
    form.elements.uid.value = contact && contact.uid ? contact.uid : '';
    form.elements.full_name.value = contact && contact.full_name ? contact.full_name : '';
    form.elements.email.value = contact && contact.email ? contact.email : '';
    form.elements.phone.value = contact && contact.phone ? contact.phone : '';
    form.elements.organization.value = contact && contact.organization ? contact.organization : '';
    form.elements.job_title.value = contact && contact.job_title ? contact.job_title : '';
    $('#contact_dialog_title').textContent = contact && contact.url ? 'Edit contact' : 'Create contact';
    $('#contact_dialog').hidden = false;
    form.elements.full_name.focus();
  }

  function closeDialog() {
    $('#contact_dialog').hidden = true;
  }

  document.addEventListener('DOMContentLoaded', function() {
    $('#contact_create').addEventListener('click', openDialog);
    $('#contact_cancel').addEventListener('click', closeDialog);
    $('#contact_cancel_icon').addEventListener('click', closeDialog);
    $('#contacts_refresh').addEventListener('click', loadContacts);
    $('#contacts_search').addEventListener('input', render);

    document.querySelectorAll('.contacts-view-switch button').forEach(function(button) {
      button.addEventListener('click', function() {
        userSelectedView = true;
        setContactView(button.dataset.view);
      });
    });

    var contactViewQuery = window.matchMedia && window.matchMedia('(max-width: 900px)');
    if (contactViewQuery) {
      var handleContactViewQueryChange = function() {
        if (!userSelectedView) {
          setContactView(defaultContactView());
        }
      };
      if (contactViewQuery.addEventListener) {
        contactViewQuery.addEventListener('change', handleContactViewQueryChange);
      } else if (contactViewQuery.addListener) {
        contactViewQuery.addListener(handleContactViewQueryChange);
      }
    }

    $('#contact_form').addEventListener('submit', function(event) {
      event.preventDefault();
      fetch(event.target.action, {
        method: 'POST',
        credentials: 'same-origin',
        headers: {
          'Accept': 'application/json',
          'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
        },
        body: formBody(new FormData(event.target))
      })
        .then(function(response) {
          if (!response.ok) {
            throw new Error('Unable to save contact');
          }
          return response.json();
        })
        .then(function(payload) {
          var updated = false;
          contacts = contacts.map(function(contact) {
            if (payload.data && contact.url === payload.data.url) {
              updated = true;
              return payload.data;
            }
            return contact;
          });
          if (!updated && payload.data) {
            contacts.push(payload.data);
          }
          contacts.sort(function(a, b) {
            return text(a.full_name).localeCompare(text(b.full_name));
          });
          closeDialog();
          render();
        });
    });

    setContactView(defaultContactView());
    loadContacts();
  });
})();
</script>
