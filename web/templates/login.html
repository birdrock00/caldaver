{% extends 'layout.html' %}

{% block content %}
<div class="container">

{% if error is defined %}
<div class="ui-widget loginerrors">
 <div class="ui-state-error ui-corner-all" style="padding: 0 .7em;">
   <p><span class="ui-icon ui-icon-alert" style="float: left; margin-right: .3em;"></span>
   {{ error|e }}
   </p>
  </div>
</div>
{% endif %}

<div class="loginform ui-corner-all">
  <img src="{{ asset('caldaver_300transp.png', 'img') }}" alt="Caldaver" style="max-width: 200px; margin-bottom: 16px;">
  <form method="post" action="{{ path('login') }}" class="form-horizontal">
    <div class="form-group">
      <label class="col-sm-3 control-label" for="user">{% trans %}labels.username{% endtrans %}</label>
      <div class="col-sm-9"><input id="user" name="user" class="form-control" type="text"
        autocomplete="username" autocapitalize="none" spellcheck="false" inputmode="text"
        enterkeyhint="next" autofocus="autofocus" required></div>
    </div>

    <div class="form-group">
      <label class="col-sm-3 control-label" for="password">{% trans %}labels.password{% endtrans %}</label>
      <div class="col-sm-9"><input id="password" name="password" class="form-control" type="password"
        autocomplete="current-password" enterkeyhint="go" required></div>
    </div>

    <input name="login" value="{% trans %}labels.login{% endtrans %}" type="submit" class="btn btn-primary">
  </form>

</div>
</div>
{% endblock %}
