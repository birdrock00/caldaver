<VirtualHost *:8080>
    DocumentRoot /var/www/caldaver/web/public
    ServerName ${CALDAVER_SERVER_NAME}
    ErrorLog ${APACHE_LOG_DIR}/davi-error.log
    LogLevel warn
    CustomLog ${APACHE_LOG_DIR}/access.log combined
    <Location />
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^ index.php [QSA,L]
    </Location>
</VirtualHost>
